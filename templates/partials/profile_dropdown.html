{% if user.is_authenticated %}
<div
    id="profile-dropdown"
    class="hidden fixed z-[60] min-w-[220px] bg-zinc-900 border border-zinc-700/50 rounded-xl shadow-2xl overflow-hidden"
>
    <a href="{% url 'settings' %}" class="flex items-center gap-3 px-3 py-2.5 text-zinc-300 hover:bg-zinc-800 hover:text-white transition-colors text-xs">
        <svg class="shrink-0 text-zinc-500" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <path d="M12.22 2h-.44a2 2 0 0 0-2 2v.18a2 2 0 0 1-1 1.73l-.43.25a2 2 0 0 1-2 0l-.15-.08a2 2 0 0 0-2.73.73l-.22.38a2 2 0 0 0 .73 2.73l.15.1a2 2 0 0 1 1 1.72v.51a2 2 0 0 1-1 1.74l-.15.09a2 2 0 0 0-.73 2.73l.22.38a2 2 0 0 0 2.73.73l.15-.08a2 2 0 0 1 2 0l.43.25a2 2 0 0 1 1 1.73V20a2 2 0 0 0 2 2h.44a2 2 0 0 0 2-2v-.18a2 2 0 0 1 1-1.73l.43-.25a2 2 0 0 1 2 0l.15.08a2 2 0 0 0 2.73-.73l.22-.39a2 2 0 0 0-.73-2.73l-.15-.08a2 2 0 0 1-1-1.74v-.5a2 2 0 0 1 1-1.74l.15-.09a2 2 0 0 0 .73-2.73l-.22-.38a2 2 0 0 0-2.73-.73l-.15.08a2 2 0 0 1-2 0l-.43-.25a2 2 0 0 1-1-1.73V4a2 2 0 0 0-2-2z"/><circle cx="12" cy="12" r="3"/>
        </svg>
        Settings
    </a>
    <div>
        <button id="language-toggle" class="w-full flex items-center gap-3 px-3 py-2.5 text-zinc-300 hover:bg-zinc-800 hover:text-white transition-colors text-xs">
            <svg class="shrink-0 text-zinc-500" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                <circle cx="12" cy="12" r="10"/><path d="M12 2a15.3 15.3 0 0 1 4 10 15.3 15.3 0 0 1-4 10 15.3 15.3 0 0 1-4-10 15.3 15.3 0 0 1 4-10z"/><path d="M2 12h20"/>
            </svg>
            <span>Language</span>
            <span id="active-language-label" class="ml-auto mr-1 text-zinc-500 text-[11px]">{{ language }}</span>
            <svg id="language-arrow" class="text-zinc-600 transition-transform duration-200 shrink-0" width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
                <path d="m9 18 6-6-6-6"/>
            </svg>
        </button>
        <div id="language-submenu" class="hidden border-t border-zinc-800/60 bg-zinc-950/40">
            <button data-lang="English"  class="language-option w-full flex items-center justify-between px-5 py-2 text-zinc-400 hover:bg-zinc-800 hover:text-white transition-colors text-xs">English<svg class="lang-check {% if language != 'English' %}hidden{% endif %} text-orange-400" width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M20 6 9 17l-5-5"/></svg></button>
            <button data-lang="Hindi"    class="language-option w-full flex items-center justify-between px-5 py-2 text-zinc-400 hover:bg-zinc-800 hover:text-white transition-colors text-xs">Hindi<svg class="lang-check {% if language != 'Hindi' %}hidden{% endif %} text-orange-400" width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M20 6 9 17l-5-5"/></svg></button>
            <button data-lang="Spanish"  class="language-option w-full flex items-center justify-between px-5 py-2 text-zinc-400 hover:bg-zinc-800 hover:text-white transition-colors text-xs">Spanish<svg class="lang-check {% if language != 'Spanish' %}hidden{% endif %} text-orange-400" width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M20 6 9 17l-5-5"/></svg></button>
            <button data-lang="French"   class="language-option w-full flex items-center justify-between px-5 py-2 text-zinc-400 hover:bg-zinc-800 hover:text-white transition-colors text-xs">French<svg class="lang-check {% if language != 'French' %}hidden{% endif %} text-orange-400" width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M20 6 9 17l-5-5"/></svg></button>
            <button data-lang="Japanese" class="language-option w-full flex items-center justify-between px-5 py-2 text-zinc-400 hover:bg-zinc-800 hover:text-white transition-colors text-xs">Japanese<svg class="lang-check {% if language != 'Japanese' %}hidden{% endif %} text-orange-400" width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M20 6 9 17l-5-5"/></svg></button>
        </div>
    </div>
    <div>
        <button id="font-toggle" class="w-full flex items-center gap-3 px-3 py-2.5 text-zinc-300 hover:bg-zinc-800 hover:text-white transition-colors text-xs">
            <svg class="shrink-0 text-zinc-500" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                <polyline points="4 7 4 4 20 4 20 7"/><line x1="9" y1="20" x2="15" y2="20"/><line x1="12" y1="4" x2="12" y2="20"/>
            </svg>
            <span>Font</span>
            <span id="active-font-label" class="ml-auto mr-1 text-zinc-500 text-[11px] capitalize">{{ font }}</span>
            <svg id="font-arrow" class="text-zinc-600 transition-transform duration-200 shrink-0" width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
                <path d="m9 18 6-6-6-6"/>
            </svg>
        </button>
        <div id="font-submenu" class="hidden border-t border-zinc-800/60 bg-zinc-950/40">
            <button data-font="system"  class="font-option w-full flex items-center justify-between px-5 py-2 text-zinc-400 hover:bg-zinc-800 hover:text-white transition-colors text-xs" style="font-family:ui-sans-serif,system-ui,sans-serif">System default<svg class="font-check {% if font != 'system' %}hidden{% endif %} text-orange-400" width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M20 6 9 17l-5-5"/></svg></button>
            <button data-font="inter"   class="font-option w-full flex items-center justify-between px-5 py-2 text-zinc-400 hover:bg-zinc-800 hover:text-white transition-colors text-xs" style="font-family:'Inter',sans-serif">Inter<svg class="font-check {% if font != 'inter' %}hidden{% endif %} text-orange-400" width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M20 6 9 17l-5-5"/></svg></button>
            <button data-font="lora"    class="font-option w-full flex items-center justify-between px-5 py-2 text-zinc-400 hover:bg-zinc-800 hover:text-white transition-colors text-xs" style="font-family:'Lora',serif">Lora<svg class="font-check {% if font != 'lora' %}hidden{% endif %} text-orange-400" width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M20 6 9 17l-5-5"/></svg></button>
            <button data-font="nunito"  class="font-option w-full flex items-center justify-between px-5 py-2 text-zinc-400 hover:bg-zinc-800 hover:text-white transition-colors text-xs" style="font-family:'Nunito',sans-serif">Nunito<svg class="font-check {% if font != 'nunito' %}hidden{% endif %} text-orange-400" width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M20 6 9 17l-5-5"/></svg></button>
            <button data-font="poppins" class="font-option w-full flex items-center justify-between px-5 py-2 text-zinc-400 hover:bg-zinc-800 hover:text-white transition-colors text-xs" style="font-family:'Poppins',sans-serif">Poppins<svg class="font-check {% if font != 'poppins' %}hidden{% endif %} text-orange-400" width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M20 6 9 17l-5-5"/></svg></button>
        </div>
    </div>
    <div class="border-t border-zinc-800/60 my-1"></div>
    <button id="logout-btn" class="w-full flex items-center gap-3 px-3 py-2.5 text-red-400 hover:bg-zinc-800 hover:text-red-300 transition-colors text-xs">
        <svg class="shrink-0" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"/><polyline points="16 17 21 12 16 7"/><line x1="21" y1="12" x2="9" y2="12"/>
        </svg>
        Log out
    </button>
</div>
{% endif %}
