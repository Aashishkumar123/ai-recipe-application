<!DOCTYPE html>
<html lang="en" data-theme="{{ theme }}">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}Recipe Chef{% endblock %}</title>
    {% load static %}
    <link rel="stylesheet" href="{% static 'output.css' %}?v=12">
    <!-- Resolve "system" theme before paint to prevent flash -->
    <script>
        (function () {
            var t = document.documentElement.getAttribute("data-theme");
            if (t === "system") {
                var dark = window.matchMedia && window.matchMedia("(prefers-color-scheme: dark)").matches;
                document.documentElement.setAttribute("data-theme", dark ? "dark" : "light");
            }
        })();
    </script>
</head>
<body class="flex h-screen overflow-hidden antialiased">
    <!-- CSRF token available to every page's JS -->
    <div hidden>{% csrf_token %}</div>

    <!-- Mobile sidebar overlay -->
    <div id="sidebar-overlay" class="fixed inset-0 bg-black/50 z-40 hidden md:hidden"></div>

    {% include "partials/sidebar.html" %}
    {% include "partials/profile_dropdown.html" %}

    <!-- Notification dropdown — anchored to bell button -->
    <div id="notif-dropdown" class="hidden fixed z-[200] w-80 bg-zinc-800 border border-zinc-700/80 rounded-xl shadow-2xl overflow-hidden">
        <div class="flex items-center justify-between px-4 py-3 border-b border-zinc-700/60">
            <span class="text-sm font-semibold text-zinc-100">Notifications</span>
            <button id="notif-mark-all" class="text-xs text-orange-400 hover:text-orange-300 transition-colors">Mark all read</button>
        </div>
        <div id="notif-list" class="max-h-80 overflow-y-auto">
            <div id="notif-empty" class="flex flex-col items-center gap-2 py-8 px-4">
                <div class="w-8 h-8 rounded-full bg-zinc-700/60 flex items-center justify-center text-base">🔔</div>
                <p class="text-zinc-500 text-xs text-center">You're all caught up!</p>
            </div>
        </div>
    </div>

    <!-- Chat item context menu — lives outside <aside> so sidebar overflow can't clip it -->
    <div id="chat-menu-dropdown" class="hidden fixed z-[200] w-40 bg-zinc-800 border border-zinc-700/80 rounded-xl shadow-2xl py-1 overflow-hidden">
        <button id="chat-menu-rename" class="w-full flex items-center gap-2.5 px-3 py-2 text-xs text-zinc-300 hover:bg-zinc-700 hover:text-white transition-colors">
            <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                <path d="M17 3a2.85 2.83 0 1 1 4 4L7.5 20.5 2 22l1.5-5.5Z"/>
            </svg>
            Rename
        </button>
        <div class="h-px bg-zinc-700/60 mx-2 my-0.5"></div>
        <button id="chat-menu-delete" class="w-full flex items-center gap-2.5 px-3 py-2 text-xs text-red-400 hover:bg-red-500/10 hover:text-red-300 transition-colors">
            <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                <polyline points="3 6 5 6 21 6"/><path d="M19 6l-1 14a2 2 0 0 1-2 2H8a2 2 0 0 1-2-2L5 6"/><path d="M10 11v6M14 11v6"/><path d="M9 6V4a1 1 0 0 1 1-1h4a1 1 0 0 1 1 1v2"/>
            </svg>
            Delete
        </button>
    </div>

    <main class="flex-1 flex flex-col min-w-0 overflow-hidden">
        {% block content %}{% endblock %}
    </main>

    {% include "partials/signin_modal.html" %}

    <!-- Full-page spinner (logout / page transitions) -->
    <div id="page-spinner" class="hidden fixed inset-0 z-[200] bg-white/80 backdrop-blur-sm flex items-center justify-center">
        <div class="flex flex-col items-center gap-5">
            <div class="relative w-20 h-20">
                <svg class="absolute inset-0 text-orange-100" viewBox="0 0 80 80" fill="none">
                    <circle cx="40" cy="40" r="34" stroke="currentColor" stroke-width="6"/>
                </svg>
                <svg class="absolute inset-0 text-orange-500 animate-spin" viewBox="0 0 80 80" fill="none" style="animation-duration:0.8s">
                    <circle cx="40" cy="40" r="34" stroke="currentColor" stroke-width="6"
                        stroke-linecap="round" stroke-dasharray="60 154"/>
                </svg>
                <div class="absolute inset-0 flex items-center justify-center text-2xl select-none">🍳</div>
            </div>
            <div class="flex items-center gap-1.5">
                <span class="w-1.5 h-1.5 rounded-full bg-orange-400 animate-bounce" style="animation-delay:0s"></span>
                <span class="w-1.5 h-1.5 rounded-full bg-orange-400 animate-bounce" style="animation-delay:0.15s"></span>
                <span class="w-1.5 h-1.5 rounded-full bg-orange-400 animate-bounce" style="animation-delay:0.3s"></span>
            </div>
        </div>
    </div>

    <script src="{% static 'sidebar.js' %}"></script>
    {% block scripts %}{% endblock %}
</body>
</html>
