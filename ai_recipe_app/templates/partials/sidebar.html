<aside id="sidebar" class="fixed md:relative inset-y-0 left-0 z-50 w-64 bg-zinc-950 flex flex-col h-screen shrink-0 border-r border-zinc-800/60 -translate-x-full md:translate-x-0 transition-transform duration-300 ease-in-out">

    <!-- Header -->
    <div class="flex items-center justify-between px-4 py-3.5 border-b border-zinc-800/60">
        <div class="flex items-center gap-2.5">
            <div class="w-7 h-7 bg-orange-500 rounded-lg flex items-center justify-center text-sm leading-none">🍳</div>
            <span class="text-white font-semibold text-sm tracking-tight">Recipe Chef</span>
        </div>
        <button
            id="new-chat-btn"
            class="text-zinc-500 hover:text-white hover:bg-zinc-800 p-1.5 rounded-md transition-colors"
            title="New chat"
        >
            <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                <path d="M11 4H4a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2v-7"/>
                <path d="M18.5 2.5a2.121 2.121 0 0 1 3 3L12 15l-4 1 1-4 9.5-9.5z"/>
            </svg>
        </button>
    </div>

    <!-- Search -->
    <div class="px-3 pt-3 pb-1">
        <div class="flex items-center gap-2 bg-zinc-900 border border-zinc-800 rounded-lg px-3 py-2 focus-within:border-zinc-600 transition-colors">
            <svg class="text-zinc-600 shrink-0" width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
                <circle cx="11" cy="11" r="8"/><path d="m21 21-4.35-4.35"/>
            </svg>
            <input
                type="text"
                placeholder="Search conversations..."
                class="bg-transparent text-zinc-300 text-xs placeholder-zinc-600 outline-none w-full"
            >
        </div>
    </div>

    <!-- History -->
    <div class="flex-1 overflow-y-auto px-2 py-2 space-y-4">
        <div>
            <p class="text-zinc-600 text-[10px] font-semibold uppercase tracking-widest px-2 py-1.5">Today</p>
            <div class="space-y-0.5">
                <button class="w-full text-left px-3 py-2 text-zinc-200 text-xs rounded-md bg-zinc-800/60 hover:bg-zinc-800/80 truncate transition-colors">Pad Thai noodles with shrimp</button>
                <button class="w-full text-left px-3 py-2 text-zinc-500 text-xs rounded-md hover:bg-zinc-800/80 hover:text-zinc-200 truncate transition-colors">Chicken Tikka Masala</button>
                <button class="w-full text-left px-3 py-2 text-zinc-500 text-xs rounded-md hover:bg-zinc-800/80 hover:text-zinc-200 truncate transition-colors">Miso ramen from scratch</button>
            </div>
        </div>
        <div>
            <p class="text-zinc-600 text-[10px] font-semibold uppercase tracking-widest px-2 py-1.5">Yesterday</p>
            <div class="space-y-0.5">
                <button class="w-full text-left px-3 py-2 text-zinc-500 text-xs rounded-md hover:bg-zinc-800/80 hover:text-zinc-200 truncate transition-colors">Classic beef lasagne</button>
                <button class="w-full text-left px-3 py-2 text-zinc-500 text-xs rounded-md hover:bg-zinc-800/80 hover:text-zinc-200 truncate transition-colors">Tiramisu</button>
                <button class="w-full text-left px-3 py-2 text-zinc-500 text-xs rounded-md hover:bg-zinc-800/80 hover:text-zinc-200 truncate transition-colors">Vegan mushroom risotto</button>
            </div>
        </div>
        <div>
            <p class="text-zinc-600 text-[10px] font-semibold uppercase tracking-widest px-2 py-1.5">Last 7 days</p>
            <div class="space-y-0.5">
                <button class="w-full text-left px-3 py-2 text-zinc-500 text-xs rounded-md hover:bg-zinc-800/80 hover:text-zinc-200 truncate transition-colors">Korean BBQ short ribs</button>
                <button class="w-full text-left px-3 py-2 text-zinc-500 text-xs rounded-md hover:bg-zinc-800/80 hover:text-zinc-200 truncate transition-colors">Sourdough bread</button>
                <button class="w-full text-left px-3 py-2 text-zinc-500 text-xs rounded-md hover:bg-zinc-800/80 hover:text-zinc-200 truncate transition-colors">Thai green curry</button>
                <button class="w-full text-left px-3 py-2 text-zinc-500 text-xs rounded-md hover:bg-zinc-800/80 hover:text-zinc-200 truncate transition-colors">Vegan chocolate cake</button>
            </div>
        </div>
    </div>

    <!-- Profile section with dropdown -->
    <div class="p-2 border-t border-zinc-800/60 relative">
    {% if not user.is_authenticated %}
        <!-- Signed-out: show Sign In button -->
        <button
            id="signin-btn"
            class="w-full flex items-center gap-3 px-3 py-2.5 rounded-lg hover:bg-zinc-800/80 transition-colors group"
        >
            <div class="w-8 h-8 bg-zinc-800 border border-zinc-700 rounded-full flex items-center justify-center shrink-0">
                <svg class="text-zinc-400" width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                    <path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/><circle cx="12" cy="7" r="4"/>
                </svg>
            </div>
            <div class="flex-1 min-w-0 text-left">
                <p class="text-zinc-300 text-xs font-medium group-hover:text-white transition-colors">Sign in</p>
                <p class="text-zinc-600 text-[11px]">Save your recipes &amp; history</p>
            </div>
            <svg class="text-zinc-600 group-hover:text-zinc-400 shrink-0 transition-colors" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                <path d="m9 18 6-6-6-6"/>
            </svg>
        </button>
    {% else %}
        <!-- Signed-in: show profile with dropdown -->

        <!-- Dropdown (opens above) -->
        <div
            id="profile-dropdown"
            class="hidden absolute bottom-full left-2 right-2 mb-1.5 bg-zinc-900 border border-zinc-700/50 rounded-xl shadow-2xl overflow-hidden"
        >
            <!-- Settings -->
            <a href="{% url 'settings' %}" class="flex items-center gap-3 px-3 py-2.5 text-zinc-300 hover:bg-zinc-800 hover:text-white transition-colors text-xs">
                <svg class="shrink-0 text-zinc-500" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                    <path d="M12.22 2h-.44a2 2 0 0 0-2 2v.18a2 2 0 0 1-1 1.73l-.43.25a2 2 0 0 1-2 0l-.15-.08a2 2 0 0 0-2.73.73l-.22.38a2 2 0 0 0 .73 2.73l.15.1a2 2 0 0 1 1 1.72v.51a2 2 0 0 1-1 1.74l-.15.09a2 2 0 0 0-.73 2.73l.22.38a2 2 0 0 0 2.73.73l.15-.08a2 2 0 0 1 2 0l.43.25a2 2 0 0 1 1 1.73V20a2 2 0 0 0 2 2h.44a2 2 0 0 0 2-2v-.18a2 2 0 0 1 1-1.73l.43-.25a2 2 0 0 1 2 0l.15.08a2 2 0 0 0 2.73-.73l.22-.39a2 2 0 0 0-.73-2.73l-.15-.08a2 2 0 0 1-1-1.74v-.5a2 2 0 0 1 1-1.74l.15-.09a2 2 0 0 0 .73-2.73l-.22-.38a2 2 0 0 0-2.73-.73l-.15.08a2 2 0 0 1-2 0l-.43-.25a2 2 0 0 1-1-1.73V4a2 2 0 0 0-2-2z"/><circle cx="12" cy="12" r="3"/>
                </svg>
                Settings
            </a>

            <!-- Language (accordion) -->
            <div>
                <button id="language-toggle" class="w-full flex items-center gap-3 px-3 py-2.5 text-zinc-300 hover:bg-zinc-800 hover:text-white transition-colors text-xs">
                    <svg class="shrink-0 text-zinc-500" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                        <circle cx="12" cy="12" r="10"/><path d="M12 2a15.3 15.3 0 0 1 4 10 15.3 15.3 0 0 1-4 10 15.3 15.3 0 0 1-4-10 15.3 15.3 0 0 1 4-10z"/><path d="M2 12h20"/>
                    </svg>
                    <span>Language</span>
                    <span id="active-language-label" class="ml-auto mr-1 text-zinc-500 text-[11px]">{{ language }}</span>
                    <svg id="language-arrow" class="text-zinc-600 transition-transform duration-200 shrink-0" width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
                        <path d="m9 18 6-6-6-6"/>
                    </svg>
                </button>

                <!-- Language list -->
                <div id="language-submenu" class="hidden border-t border-zinc-800/60 bg-zinc-950/40">
                    <button data-lang="English"  class="language-option w-full flex items-center justify-between px-5 py-2 text-zinc-400 hover:bg-zinc-800 hover:text-white transition-colors text-xs">
                        English
                        <svg class="lang-check {% if language != 'English' %}hidden{% endif %} text-orange-400" width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M20 6 9 17l-5-5"/></svg>
                    </button>
                    <button data-lang="Hindi"    class="language-option w-full flex items-center justify-between px-5 py-2 text-zinc-400 hover:bg-zinc-800 hover:text-white transition-colors text-xs">
                        Hindi
                        <svg class="lang-check {% if language != 'Hindi' %}hidden{% endif %} text-orange-400" width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M20 6 9 17l-5-5"/></svg>
                    </button>
                    <button data-lang="Spanish"  class="language-option w-full flex items-center justify-between px-5 py-2 text-zinc-400 hover:bg-zinc-800 hover:text-white transition-colors text-xs">
                        Spanish
                        <svg class="lang-check {% if language != 'Spanish' %}hidden{% endif %} text-orange-400" width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M20 6 9 17l-5-5"/></svg>
                    </button>
                    <button data-lang="French"   class="language-option w-full flex items-center justify-between px-5 py-2 text-zinc-400 hover:bg-zinc-800 hover:text-white transition-colors text-xs">
                        French
                        <svg class="lang-check {% if language != 'French' %}hidden{% endif %} text-orange-400" width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M20 6 9 17l-5-5"/></svg>
                    </button>
                    <button data-lang="Japanese" class="language-option w-full flex items-center justify-between px-5 py-2 text-zinc-400 hover:bg-zinc-800 hover:text-white transition-colors text-xs">
                        Japanese
                        <svg class="lang-check {% if language != 'Japanese' %}hidden{% endif %} text-orange-400" width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M20 6 9 17l-5-5"/></svg>
                    </button>
                </div>
            </div>

            <!-- Divider -->
            <div class="border-t border-zinc-800/60 my-1"></div>

            <!-- Logout -->
            <button id="logout-btn" class="w-full flex items-center gap-3 px-3 py-2.5 text-red-400 hover:bg-zinc-800 hover:text-red-300 transition-colors text-xs">
                <svg class="shrink-0" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                    <path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"/><polyline points="16 17 21 12 16 7"/><line x1="21" y1="12" x2="9" y2="12"/>
                </svg>
                Log out
            </button>
        </div>

        <!-- Profile button -->
        <button id="profile-btn" class="w-full flex items-center gap-3 px-3 py-2.5 rounded-lg hover:bg-zinc-800/80 transition-colors group">
            <div class="w-8 h-8 bg-gradient-to-br from-blue-500 to-violet-600 rounded-full flex items-center justify-center text-white text-sm font-bold shrink-0">A</div>
            <div class="flex-1 min-w-0 text-left">
                <p class="text-zinc-200 text-xs font-medium truncate">Aashish Kumar</p>
                <p class="text-zinc-600 text-[11px] truncate">aashishkumar12376@gmail.com</p>
            </div>
            <svg id="profile-chevron" class="text-zinc-600 group-hover:text-zinc-400 shrink-0 transition-transform duration-200" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                <path d="m18 15-6-6-6 6"/>
            </svg>
        </button>
    {% endif %}

    </div>

</aside>
